<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRRT UF Tolerance Calculator — SNUBH EICU2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: #0f172a; color: #e2e8f0; line-height: 1.55;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 440px; background: #111827;
    border: 1px solid #334155; border-radius: 18px; padding: 28px 24px;
    box-shadow: 0 18px 48px rgba(0,0,0,0.4);
  }
  h1 { font-size: 19px; color: #f8fafc; margin-bottom: 4px; }
  .sub { font-size: 12.5px; color: #94a3b8; margin-bottom: 20px; }
  .btns { display: flex; flex-direction: column; gap: 12px; }
  a.btn {
    display: flex; align-items: center; gap: 12px; text-decoration: none;
    padding: 16px 18px; border-radius: 12px; font-weight: 700; font-size: 15px;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  a.btn:active { transform: scale(0.98); }
  .btn-mobile { background: linear-gradient(135deg, #22d3ee, #0ea5e9); color: #042f3a; }
  .btn-desktop { background: #1f2937; color: #e2e8f0; border: 1px solid #475569; }
  .btn .emoji { font-size: 22px; }
  .btn .desc { font-size: 11.5px; font-weight: 500; opacity: 0.85; display: block; }
  .note {
    margin-top: 18px; font-size: 10.5px; color: #64748b;
    border-top: 1px solid #334155; padding-top: 12px;
  }
  .redirect {
    margin-top: 14px; font-size: 12px; color: #cbd5e1; text-align: center;
    min-height: 18px;
  }
  .redirect a { color: #38bdf8; cursor: pointer; }
</style>
</head>
<body>
  <div class="card">
    <h1>🩺 CRRT UF Tolerance Calculator</h1>
    <div class="sub">ICU CRRT 환자 시간당 안전 PT removal 보조 · SNUBH EICU2 · v1.3</div>

    <div class="btns">
      <a class="btn btn-mobile" href="CRRT_Calculator_v1.3_mobile.html">
        <span class="emoji">📱</span>
        <span>모바일 버전<span class="desc">처방 보조 결과가 화면 상단 · 단일 컬럼</span></span>
      </a>
      <a class="btn btn-desktop" href="CRRT_Calculator_v1.3.html">
        <span class="emoji">🖥️</span>
        <span>데스크톱 (전체) 버전<span class="desc">입력 + 결과 2-컬럼 레이아웃</span></span>
      </a>
    </div>

    <div class="redirect" id="redirect"></div>

    <div class="note">
      ⚠️ 본 도구는 evidence-informed clinical decision support이며 RCT-validated prescription tool이 아닙니다.
      최종 판단은 담당 의료진의 hemodynamic 평가에 근거하세요.
    </div>
  </div>

<script>
  // 폰으로 접속하면 모바일 버전으로 자동 안내 (취소 가능)
  var isPhone = window.matchMedia('(max-width: 768px)').matches
             || /Android|iPhone|iPod|Mobile/i.test(navigator.userAgent);
  if (isPhone) {
    var el = document.getElementById('redirect');
    var secs = 2;
    var target = 'CRRT_Calculator_v1.3_mobile.html';
    var cancelled = false;
    function tick() {
      if (cancelled) return;
      if (secs <= 0) { location.href = target; return; }
      el.innerHTML = secs + '초 후 모바일 버전으로 이동… <a id="cancelRedirect">취소</a>';
      document.getElementById('cancelRedirect').onclick = function () {
        cancelled = true; el.textContent = '여기서 직접 선택하세요.';
      };
      secs--; setTimeout(tick, 1000);
    }
    tick();
  }
</script>
</body>
</html>
